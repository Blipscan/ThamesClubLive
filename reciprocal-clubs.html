<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dining — The Thames Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#07101a;
      --blue:#0c1c2e;
      --cream:#f4edd8;
      --gold:#c9a96e;
      --muted:rgba(244,237,216,.72);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 20% 85%, rgba(201,169,110,.15), transparent 34%),
        linear-gradient(180deg,var(--navy),var(--blue));
      color:var(--cream);
      font-family:'Libre Baskerville', Georgia, serif;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:32px;
    }
    .card{
      max-width:760px;
      border:1px solid rgba(201,169,110,.35);
      padding:64px 48px;
      background:rgba(7,16,26,.58);
      box-shadow:0 30px 80px rgba(0,0,0,.35);
    }
    .eyebrow{
      font-size:10px;
      letter-spacing:.32em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:22px;
      font-weight:700;
    }
    h1{
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:clamp(56px,9vw,96px);
      line-height:.88;
      text-transform:uppercase;
      letter-spacing:.03em;
      margin-bottom:24px;
    }
    .rule{
      width:120px;
      height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      margin:0 auto 28px;
    }
    p{
      font-size:17px;
      line-height:1.8;
      color:var(--muted);
      max-width:560px;
      margin:0 auto;
    }
    .home{
      display:inline-block;
      margin-top:34px;
      padding:12px 24px;
      border:1px solid rgba(201,169,110,.48);
      color:var(--cream);
      text-decoration:none;
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }
    .home:hover{background:rgba(201,169,110,.12)}
  a{color:inherit;text-decoration:none}
a:hover{color:#c9a96e}
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">The Thames Club · New London</div>
    <h1>Dining</h1>
    <div class="rule"></div>
    <p>Our dining page is being prepared. Please check back soon for menus, hours, and upcoming member dining evenings.</p>
    <a class="home" href="index.html">Return Home</a>
  </main>
</body>
</html>
