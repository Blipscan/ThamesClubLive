name: Update Events from Google Calendar

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python scripts/update_events.py

      - name: Commit, push, and trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --cached --quiet && exit 0
          git commit -m "Update events from Google Calendar"
          git pull --rebase origin main
          git push origin main
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK" || echo "Render deploy hook call failed (non-fatal)"
          else
            echo "RENDER_DEPLOY_HOOK secret not set; skipping deploy trigger"
          fi
