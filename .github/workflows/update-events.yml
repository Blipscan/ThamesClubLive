name: Update Events from Google Calendar

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install timezone data
        run: pip install tzdata

      - name: Run sync script
        run: python sync-calendar.py

      - name: Commit updated events.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add events.json
          git commit -m "Auto-update events" || echo "No changes"
          git push